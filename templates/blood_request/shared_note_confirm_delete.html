{% extends "portal_layout.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-16 px-4 sm:px-0">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-trash-alt text-2xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-900 mb-2">Delete Wiki Page?</h2>
        <p class="text-gray-500 mb-8">Are you sure you want to delete "<strong>{{ note.title }}</strong>"? This action
            cannot be undone, and all sub-pages will also be deleted or orphaned.</p>

        <div class="flex items-center justify-center space-x-4">
            <a href="{% url 'shared_note_detail' note.pk %}"
                class="px-6 py-2 bg-white border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition">
                Cancel
            </a>
            <form method="post" class="inline">
                {% csrf_token %}
                <button type="submit"
                    class="px-6 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium transition shadow-sm">
                    Yes, Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
